<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bartera - Akıllı Takas Platformu</title>
    <style>
        :root { 
            --bg-dark: #0a0f1d; 
            --panel-bg: #131c31; 
            --accent-orange: #ff6b35; 
            --accent-blue: #00b4d8; 
            --text-light: #f8f9fa; 
            --text-muted: #8da2bb; 
            --success-green: #2ec4b6; 
            --border-color: #223152; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Üst Menü ve Auth Alanı */
        header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .brand h1 { color: var(--accent-blue); font-size: 2rem; }
        .brand p { color: var(--text-muted); font-size: 0.9rem; }
        
        .auth-panel { background-color: var(--panel-bg); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
