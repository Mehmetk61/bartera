<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bartera - Akıllı Takas ve Tersine İhale Platformu</title>
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --panel-bg: #131c31;
            --accent-orange: #ff6b35;
            --accent-blue: #00b4d8;
            --text-light: #f8f9fa;
            --text-muted: #8da2bb;
            --success-green: #2ec4b6;
        }

        * {
            box-shadow: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            padding: 10px 0;
        }

        header h1 {
            color: var(--accent-blue);
            font-size: 2rem;
            letter-spacing: 2px;
            font-weight: 800;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .panel-title {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-main {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--accent-blue);
            color: var(--text-light);
            padding: 15px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            text-align: center;
        }

        .btn-main.active {
            background: var(--accent-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(0, 180, 216, 0.4);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--accent-orange);
        }

        .btn-action {
            width: 100%;
            background: linear-gradient(135s, var(--accent-orange), #ff4500);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .simulation-box {
            display: none;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .log-entry {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-takas {
            background-color: var(--success-green);
            color: var(--bg-dark);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .btn-reset {
            background: transparent;
            border: 1px dashed var(--text-muted);
            color: var(--text-muted);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>BARTERA</h1>
            <p>Geleceğin Ticaret ve Tersine İhale Ekosistemi</p>
        </header>

        <div class="panel">
            <div class="panel-title">1. İşlem Modülünü Seçin</div>
            <div class="grid-buttons">
                <div class="btn-main active" id="mod-nakit" onclick="selectMod('nakit')">Nakit / Emtia (Aktif)</div>
                <div class="btn-main" id="mod-havuz" onclick="selectMod('havuz')">Barter Havuzu (Aktif)</div>
                <div class="btn-main" id="mod-mal" onclick="selectMod('mal')">Mal / Hizmet Al (Aktif)</div>
                <div class="btn-main" id="mod-hizmet" onclick="selectMod('hizmet')">Mal / Hizmet Sat (Aktif)</div>
            </div>
        </div>

        <div class="panel" id="ihale-paneli">
            <div class="panel-title" id="form-baslik">Nakit / Emtia Tersine İhale Girişi</div>
            
            <div class="form-group">
                <label for="urun-adi">Talep Edilen Mal / Hizmet:</label>
                <input type="text" id="urun-adi" class="form-control" placeholder="Örn: 100 Adet Ofis Koltuğu">
            </div>

            <div class="form-group">
                <label for="hedef-butce">Maksimum Hedef Bütçe (TL):</label>
                <input type="number" id="hedef-butce" class="form-control" placeholder="Örn: 150000">
            </div>

            <button class="btn-action" onclick="ihaleBaslat()">Tersine İhale Başlat</button>

            <div class="simulation-box" id="sim-kutusu"></div>
            
            <button class="btn-reset" id="reset-btn" style="display:none;" onclick="sistemiSifirla()">Sistemi ve Hafızayı Sıfırla</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://mnbqkmfxntxiafrnvzxm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_QjcsQ_0oG-qHAM3FEQK8KQ_Rl_0BkLe';
        
        const _supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let seciliMod = 'nakit';
        let simInterval;

        function selectMod(mod) {
            seciliMod = mod;
            document.querySelectorAll('.btn-main').forEach(btn => btn.classList.remove('active'));
            
            let modBaslik = "";
            if(mod === 'nakit') {
                document.getElementById('mod-nakit').classList.add('active');
                modBaslik = "Nakit / Emtia Tersine İhale Girişi";
            } else if(mod === 'havuz') {
                document.getElementById('mod-havuz').classList.add('active');
                modBaslik = "Barter Havuzu Akıllı Takas Girişi";
            } else if(mod === 'mal') {
                document.getElementById('mod-mal').classList.add('active');
                modBaslik = "Mal / Hizmet Alım İhale Girişi";
            } else if(mod === 'hizmet') {
                document.getElementById('mod-hizmet').classList.add('active');
                modBaslik = "Mal / Hizmet Satış Teklif Girişi";
            }
            
            document.getElementById('form-baslik').innerText = modBaslik;
            sistemiSifirla();
        }

        async function veritabaninaKaydet(urun, bütce, modEtiketi) {
            try {
                const { error } = await _supabaseClient
                    .from('Takas')
                    .insert([
                        { urun_adi: urun, hedef_butce: bütce, mod: modEtiketi }
                    ]);
                
                if(error) {
                    console.error("Supabase Kayıt Hatası:", error.message);
                } else {
                    console.log("İhale verisi başarıyla buluta işlendi!");
                }
            } catch (err) {
                console.error("Bağlantı Hatası:", err);
            }
        }

        function ihaleBaslat() {
            const urun = document.getElementById('urun-adi').value || "Belirtilmeyen Ürün/Hizmet";
            let bütce = parseFloat(document.getElementById('hedef-butce').value);

            if(!bütce || bütce <= 0) {
                alert("Lütfen geçerli bir hedef bütçe girin lider!");
                return;
            }

            veritabaninaKaydet(urun, bütce, modEtiketiGetir());

            const simKutusu = document.getElementById('sim-kutusu');
            simKutusu.style.display = "block";
            simKutusu.innerHTML = `<div class="log-entry" style="color:var(--accent-blue)">[SİSTEM] ${modEtiketiGetir()} İhalesi Başlatıldı...</div>`;
            
            document.getElementById('reset-btn').style.display = "block";

            let sayac = 0;
            let mevcutFiyat = bütce;
            const firmalar = ["Asya Ticaret", "Kamiloğlu Lojistik", "Avrasya Ltd.", "TeknoGlobal", "Ege Tedarik"];

            clearInterval(simInterval);
            simInterval = setInterval(() => {
                sayac++;
                let indirim = Math.floor(mevcutFiyat * (Math.random() * 0.04 + 0.02));
                mevcutFiyat -= indirim;
                
                let rastgeleFirma = firmalar[Math.floor(Math.random() * firmalar.length)];
                
                let log = document.createElement('div');
                log.className = 'log-entry';
                
                if(sayac === 3 || sayac === 5) {
                    log.innerHTML = `<span>⚡ ${rastgeleFirma}: <b>${mevcutFiyat.toLocaleString('tr-TR')} TL</b></span> <span class="badge-takas">%50 TAKAS İMKANI</span>`;
                } else {
                    log.innerHTML = `<span>📉 ${rastgeleFirma}: ${mevcutFiyat.toLocaleString('tr-TR')} TL</span>`;
                }
                
                simKutusu.appendChild(log);
                simKutusu.scrollTop = simKutusu.scrollHeight;

                if(sayac >= 6) {
                    clearInterval(simInterval);
                    let sonuc = document.createElement('div');
                    sonuc.className = 'log-entry';
                    sonuc.style.color = 'var(--success-green)';
                    sonuc.style.fontWeight = 'bold';
                    sonuc.style.marginTop = '10px';
                    sonuc.innerHTML = `<span>🏆 EN UYGUN TEKLİF: ${mevcutFiyat.toLocaleString('tr-TR')} TL (Eşleşme Sağlandı!)</span>`;
                    simKutusu.appendChild(sonuc);
                    simKutusu.scrollTop = simKutusu.scrollHeight;
                }
            }, 1500);
        }

        function modEtiketiGetir() {
            if(seciliMod === 'nakit') return "Nakit/Emtia";
            if(seciliMod === 'havuz') return "Barter Havuzu";
            if(seciliMod === 'mal') return "Mal/Hizmet Alım";
            return "Mal/Hizmet Satış";
        }

        function sistemiSifirla() {
            clearInterval(simInterval);
            document.getElementById('urun-adi').value = "";
            document.getElementById('hedef-butce').value = "";
            const simKutusu = document.getElementById('sim-kutusu');
            simKutusu.innerHTML = "";
            simKutusu.style.display = "none";
            document.getElementById('reset-btn').style.display = "none";
        }
    </script>
</body>
</html>
