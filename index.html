<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bartera - Akıllı Takas Platformu</title>
    <style>
        :root { --bg-dark: #0a0f1d; --panel-bg: #131c31; --accent-orange: #ff6b35; --accent-blue: #00b4d8; --text-light: #f8f9fa; --text-muted: #8da2bb; --success-green: #2ec4b6; --border-color: #223152; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; width: 100%; max-width: 1200px; }
        header h1 { color: var(--accent-blue); font-size: 2.5rem; margin-bottom: 5px; }
        header p { color: var(--text-muted); }
        .main-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; width: 100%; max-width: 1200px; }
        @media (max-width: 768px) { .main-container { grid-template-columns: 1fr; } }
        .panel { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; }
        .panel h2 { font-size: 1.4rem; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background-color: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-light); font-size: 1rem; outline: none; }
        button.btn-primary { width: 100%; padding: 14px; background-color: var(--accent-orange); border: none; border-radius: 6px; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .live-stream { background-color: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 6px; height: 320px; overflow-y: auto; padding: 15px; font-family: monospace; font-size: 0.9rem; }
        .stream-item { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed #1a2642; }
        .stream-success { color: var(--success-green); }
        .stream-info { color: var(--accent-blue); }
        .stream-time { color: var(--text-muted); margin-right: 5px; }
    </style>
</head>
<body>
    <header><h1>BARTERA</h1><p>Akıllı Takas, Barter ve Tersine İhale Altyapısı</p></header>
    <div class="main-container">
        <div class="panel">
            <h2>Tersine İhale / Takas Başlat</h2>
            <form id="ihaleForm">
                <div class="form-group"><label for="urunAdi">Talep Edilen Mal / Hizmet</label><input type="text" id="urunAdi" placeholder="Örn: 100 Adet Ofis Koltuğu" required></div>
                <div class="form-group"><label for="hedefButce">Maksimum Hedef Bütçe (₺)</label><input type="number" id="hedefButce" placeholder="Örn: 150000" required></div>
                <div class="form-group"><label for="islemModu">İşlem Modülü</label><select id="islemModu"><option value="Nakit/Emtia">Nakit / Emtia (Tersine İhale)</option><option value="TamTakas">Tam Takas (Barter)</option><option value="KismiTakas">Kısmi Takas + Nakit</option></select></div>
                <button type="submit" class="btn-primary">Tersine İhale Başlat</button>
            </form>
        </div>
        <div class="panel">
            <h2>Canlı Veritabanı Akışı (Sistem Günlüğü)</h2>
            <div class="live-stream" id="logStream">
                <div class="stream-item stream-info"><span class="stream-time">[Sistem]</span> Güvenli Make Köprüsü Aktif. Veri gönderimi bekleniyor.</div>
            </div>
        </div>
    </div>
    <script>
        // 🚀 Senin Özel Güvenli Köprü Adresin Buraya Mühürlendi Lider!
        const KOPRU_URL = "https://hook.eu1.make.com/jvnauk2q6wob7s3vwv6spv8qxd59jcvt";

        const ihaleForm = document.getElementById('ihaleForm');
        const logStream = document.getElementById('logStream');

        function addLog(message, type = 'info') {
            const now = new Date();
            const item = document.createElement('div');
            item.className = `stream-item stream-${type}`;
            item.innerHTML = `<span class="stream-time">[${now.toLocaleTimeString('tr-TR')}]</span> ${message}`;
            logStream.appendChild(item);
            logStream.scrollTop = logStream.scrollHeight;
        }

        ihaleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const urun_adi = document.getElementById('urunAdi').value;
            const mahasiswa_butce = parseInt(document.getElementById('hedefButce').value);
            const mod = document.getElementById('islemModu').value;

            addLog(`Veri güvenli köprüye aktarılıyor...`, 'info');

            try {
                const response = await fetch(KOPRU_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urun_adi, hedef_butce: mahasiswa_butce, mod })
                });

                if (response.ok) {
                    addLog(`🎉 <b>BAŞARILI:</b> Veri güvenli şekilde Make köprüsüne ulaştı!`, 'success');
                    ihaleForm.reset();
                } else {
                    addLog(`Köprü Hatası: ${response.status}`, 'info');
                }
            } catch (err) {
                addLog(`Bağlantı Hatası: ${err.message}`, 'info');
            }
        });
    </script>
</body>
</html>
