<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARTERA X - Ultra-Premium Global Trading & Barter Ecosystem</title>
    <style>
        :root {
            --bg-dark: #060a13;
            --panel-bg: rgba(19, 28, 49, 0.7);
            --accent-orange: #ff6b35;
            --accent-blue: #00b4d8;
            --neon-glow: #00f5ff;
            --text-light: #ffffff;
            --text-muted: #7e9bbd;
            --success-green: #00f5d4;
            --premium-gold: #fee440;
            --border-glow: rgba(0, 180, 216, 0.2);
        }

        * {
            box-shadow: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0d1b2a 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ticker-wrap {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glow);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success-green);
            animation: pulse 1.5s infinite;
        }

        header {
            text-align: center;
            padding: 15px 0;
            position: relative;
        }

        header h1 {
            color: var(--text-light);
            font-size: 3rem;
            letter-spacing: 6px;
            font-weight: 900;
            background: linear-gradient(135s, #fff 30%, var(--accent-blue), var(--neon-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 180, 216, 0.2);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
        }

        .panel:hover {
            border-color: rgba(0, 180, 216, 0.3);
            box-shadow: 0 20px 50px rgba(0, 180, 216, 0.1);
        }

        .panel-title {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn-main {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 18px 15px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            letter-spacing: 0.5px;
        }

        .btn-main:hover {
            border-color: var(--accent-blue);
            color: white;
            background: rgba(0, 180, 216, 0.05);
        }

        .btn-main.active {
            background: linear-gradient(135s, rgba(0, 180, 216, 0.2), rgba(0, 245, 255, 0.1));
            border: 2px solid var(--neon-glow);
            color: white;
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.25), inset 0 0 10px rgba(0, 245, 255, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--accent-orange);
            box-shadow: 0 0 15px rgba(255, 107, 53, 0.2);
        }

        .btn-action {
            width: 100%;
            background: linear-gradient(135s, var(--accent-orange), #ff4500);
            border: none;
            color: white;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(255, 107, 53, 0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.6);
        }

        .ai-analyst-panel {
            display: none;
            background: rgba(0, 180, 216, 0.05);
            border-left: 4px solid var(--accent-blue);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #d1e2f3;
        }

        .simulation-box {
            display: none;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: slideIn 0.3s ease-out;
        }

        .log-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-row-bottom {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 6px;
            margin-top: 2px;
        }

        .badge-premium {
            background: linear-gradient(135s, #00f5d4, #00b4d8);
            color: #060a13;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(0, 245, 212, 0.3);
        }

        .badge-gold {
            background: linear-gradient(135s, var(--premium-gold), #ffb703);
            color: #0
