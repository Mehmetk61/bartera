<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bartera - Akıllı Takas ve Tersine İhale Platformu</title>
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --panel-bg: #131c31;
            --accent-orange: #ff6b35;
            --accent-blue: #00b4d8;
            --text-light: #f8f9fa;
            --text-muted: #8da2bb;
            --success-green: #2ec4b6;
            --border-color: #223152;
        }

        * {
            box-shadow: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1200px;
        }

        header h1 {
            color: var(--accent-blue);
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
        }

        .panel h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--text-light);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-light);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-blue);
        }

        button.btn-primary {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-orange);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button.btn-primary:hover {
            background-color: #e0531f;
        }

        .live-stream {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            height: 320px;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
        }

        .stream-item {
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #1a2642;
            animation: fadeIn 0.5s ease-out;
        }

        .stream-success { color: var(--success-green); }
        .stream-info { color: var(--accent-blue); }
        .stream-time { color: var(--text-muted); font-size: 0.8rem; margin-right: 5px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <h1>BARTERA</h1>
        <p>Akıllı Takas, Barter ve Tersine İhale Altyapısı</p>
    </header>

    <div class="main-container">
        <div class="panel">
            <h2>Tersine İhale / Takas Başlat</h2>
            <form id="ihaleForm">
                <div class="form-group">
                    <label for="urunAdi">Talep Edilen Mal / Hizmet</label>
                    <input type="text" id="urunAdi" placeholder="Örn: 100 Adet Ofis Koltuğu" required>
                </div>
                <div class="form-group">
                    <label for="hedefButce">Maksimum Hedef Bütçe (₺)</label>
                    <input type="number" id="hedefButce" placeholder="Örn: 150000" required>
                </div>
                <div class="form-group">
                    <label for="islemModu">İşlem Modülü</label>
                    <select id="islemModu">
                        <option value="Nakit/Emtia">Nakit / Emtia (Tersine İhale)</option>
                        <option value="TamTakas">Tam Takas (Barter)</option>
                        <option value="KismiTakas">Kısmi Takas + Nakit</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Tersine İhale Başlat</button>
            </form>
        </div>

        <div class="panel">
            <h2>Canlı Veritabanı Akışı (Realtime)</h2>
            <div class="live-stream" id="logStream">
                <div class="stream-item stream-info">
                    <span class="stream-time">[Sistem]</span> Canlı dinleme aktif. Veri bekleniyor...
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase Kurulumu (Sadece tek bir kez tanımlandı)
        const SUPABASE_URL = "https://mnbqkmfxntxiafrnvzxm.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uYnFrbWZ4bnR4aWFmcm52enhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUyNTIzMTMsImV4cCI6MjA2MDg4ODMxM30.bU9pWkYwYkJndm5jM1I0NEd4cW1hZExiX2ExSnp2U3dYQmdzX3F6bF96NA";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const ihaleForm = document.getElementById('ihaleForm');
        const logStream = document.getElementById('logStream');

        function addLog(message, type = 'info') {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('tr-TR');
            const item = document.createElement('div');
            item.className = `stream-item stream-${type}`;
            item.innerHTML = `<span class="stream-time">[${timeStr}]</span> ${message}`;
            logStream.appendChild(item);
            logStream.scrollTop = logStream.scrollHeight;
        }

        // FORM GÖNDERME
        ihaleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const urun_adi = document.getElementById('urunAdi').value;
            const hedef_butce = parseInt(document.getElementById('hedefButce').value);
            const mod = document.getElementById('islemModu').value;

            addLog(`Veri gönderiliyor: ${urun_adi}...`, 'info');

            const { data, error } = await supabase
                .from('Takas')
                .insert([{ urun_adi, hedef_butce, mod }])
                .select(); 

            if (error) {
                addLog(`Hata oluştu: ${error.message}`, 'info');
            } else {
                addLog(`İhale başarıyla sisteme gönderildi!`, 'success');
                ihaleForm.reset();
            }
        });

        // CANLI VERİ DİNLEME (REALTIME)
        supabase
            .channel('public:Takas')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'Takas' }, payload => {
                const yeniVeri = payload.new;
                addLog(`🔥 <b>YENİ İHALE DÜŞTÜ!</b> Mod: ${yeniVeri.mod} | Ürün: ${yeniVeri.urun_adi} | Bütçe: ₺${yeniVeri.hedef_butce}`, 'success');
            })
            .subscribe();
    </script>
</body>
</html>
